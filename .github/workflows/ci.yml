name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # JOB A: backend-quality
  # ruff lint + format + pytest coverage gate
  # ============================================================
  backend-quality:
    name: "Backend Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with dev extras
        run: pip install -e ".[dev]"

      - name: Run quality gate (ruff + pytest + coverage)
        run: bash scripts/check_gate.sh

  # ============================================================
  # JOB B: frontend-quality
  # TypeScript check + ESLint + Vite production build
  # Does NOT require a live backend.
  # ============================================================
  frontend-quality:
    name: "Frontend Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Production build
        working-directory: frontend
        run: npm run build

  # ============================================================
  # JOB C: docker-integration
  # Full stack: postgres + mqtt + backend + mqtt-ingest
  # Runs migration, seed, and smoke tests against live container.
  # ============================================================
  docker-integration:
    name: "Docker Integration"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config

      - name: Assert required services present
        run: |
          SERVICES=$(docker compose config --services)
          for svc in backend postgres; do
            if ! echo "$SERVICES" | grep -qx "$svc"; then
              echo "❌ Required service '$svc' missing from docker-compose"
              exit 1
            fi
          done
          echo "✅ Required services present: $(echo "$SERVICES" | tr '\n' ' ')"

      - name: Start stack
        run: docker compose up --build -d postgres mqtt backend mqtt-ingest

      - name: Wait for postgres healthy
        run: |
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
              "$(docker compose ps -q postgres)" 2>/dev/null || echo "")
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ postgres healthy (${i}s)"
              break
            fi
            [ "$i" -eq 60 ] && { echo "❌ postgres did not become healthy in 60s"; exit 1; }
            sleep 1
          done

      - name: Run alembic upgrade head
        run: docker compose exec -T backend alembic upgrade head

      - name: Seed demo data
        run: docker compose exec -T backend python -m app.seeds.demo_seed

      - name: Wait for backend /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/healthz > /dev/null 2>&1; then
              echo "✅ backend ready (${i}s)"
              break
            fi
            [ "$i" -eq 30 ] && { echo "❌ backend did not respond in 30s"; exit 1; }
            sleep 1
          done

      - name: "Smoke: GET /healthz → 200"
        run: |
          BODY=$(curl -sf http://localhost:8000/healthz)
          EXPECTED='{"status":"ok","service":"sunshine-backend"}'
          if [ "$BODY" != "$EXPECTED" ]; then
            echo "❌ /healthz body mismatch: $BODY"; exit 1
          fi
          echo "✅ /healthz: $BODY"

      - name: "Smoke: GET /readyz → 200 with database ok"
        run: |
          STATUS=$(curl -o /dev/null -sw "%{http_code}" http://localhost:8000/readyz)
          if [ "$STATUS" != "200" ]; then
            echo "❌ /readyz returned $STATUS"; exit 1
          fi
          DB=$(curl -sf http://localhost:8000/readyz \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['checks']['database'])")
          if [ "$DB" != "ok" ]; then
            echo "❌ /readyz checks.database: $DB"; exit 1
          fi
          echo "✅ /readyz checks.database: ok"

      - name: "Smoke: GET /home → 200 (demo user)"
        run: |
          STATUS=$(curl -o /dev/null -sw "%{http_code}" \
            -H "X-User-Id: 7507fdac-da23-5956-a5a4-9239de655be0" \
            http://localhost:8000/home)
          if [ "$STATUS" != "200" ]; then
            echo "❌ /home returned $STATUS"; exit 1
          fi
          echo "✅ /home: 200"

      - name: Cleanup
        if: always()
        run: docker compose down -v || true

  # ============================================================
  # JOB D: ci-summary
  # Aggregates results; fails the workflow if any required job failed.
  # ============================================================
  ci-summary:
    name: "CI Summary"
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, docker-integration]
    if: always()
    steps:
      - name: Report
        run: |
          echo "================================================"
          echo " Sunshine CI — Full-Stack Gate"
          echo "================================================"
          echo "  backend-quality   : ${{ needs.backend-quality.result }}"
          echo "  frontend-quality  : ${{ needs.frontend-quality.result }}"
          echo "  docker-integration: ${{ needs.docker-integration.result }}"
          echo "================================================"
          if [[ "${{ needs.backend-quality.result }}"    != "success" ||
                "${{ needs.frontend-quality.result }}"   != "success" ||
                "${{ needs.docker-integration.result }}" != "success" ]]; then
            echo "❌ One or more jobs failed."
            exit 1
          fi
          echo "✅ All jobs passed."
