services:
  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      APP_NAME: sunshine-backend
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://sunshine:change-me-local-only@postgres:5432/sunshine

      # LLM runtime selection
      LLM_BACKEND: qwen

      # Dynamic RunPod/vLLM endpoint registry
      QWEN_ENDPOINT_REGISTRY_MODE: db
      QWEN_LLM_MODEL: qwen3.6
      QWEN_LLM_BASE_URL: http://localhost:8080
      QWEN_LLM_TIMEOUT_SECONDS: "120"
      QWEN_LLM_API_KEY: ""
      QWEN_LLM_AUTH_HEADER: Authorization

      # Internal endpoint registry API token
      INTERNAL_TOKEN: change-this-internal-token
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sunshine
      POSTGRES_USER: sunshine
      POSTGRES_PASSWORD: change-me-local-only
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunshine -d sunshine"]
      interval: 5s
      timeout: 5s
      retries: 10

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt-ingest:
    build: .
    command: ["python", "-m", "app.mqtt.worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://sunshine:change-me-local-only@postgres:5432/sunshine
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    restart: on-failure
