services:
  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      APP_NAME: sunshine-backend
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://sunshine:change-me-local-only@postgres:5432/sunshine
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sunshine
      POSTGRES_USER: sunshine
      POSTGRES_PASSWORD: change-me-local-only
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunshine -d sunshine"]
      interval: 5s
      timeout: 5s
      retries: 10
